<style>
:root{--bg:#EAE6DE;--panel:#F5F2EC;--ink:#2E2A24;--muted:#7A7167;--line:#D8D1C4;--accent:#8B6F47;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--ink);font-family:'Jost',-apple-system,BlinkMacSystemFont,sans-serif;-webkit-font-smoothing:antialiased;}
.wrap{max-width:1180px;margin:0 auto;padding:64px 32px 40px;}
header{text-align:center;margin-bottom:44px;}
.logo{font-family:'Playfair Display',serif;font-size:56px;line-height:1;letter-spacing:.5px;}
.logo em{font-style:italic;font-weight:400;} .logo b{font-style:normal;font-weight:600;margin-left:10px;}
.tagline{margin-top:14px;font-size:12px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);}
.contact-row{margin-top:18px;display:flex;flex-wrap:wrap;justify-content:center;align-items:center;gap:10px;font-size:12.5px;color:var(--muted);}
.contact-row a{color:var(--ink);text-decoration:none;border-bottom:1px solid transparent;transition:border-color .15s,color .15s;}
.contact-row a:hover{border-bottom-color:var(--accent);color:var(--accent);} .contact-row .dot{color:var(--line);}
.controls{display:flex;flex-wrap:wrap;align-items:center;justify-content:center;gap:10px 22px;margin:0 auto 48px;padding-bottom:28px;border-bottom:1px solid var(--line);}
.cats{display:flex;flex-wrap:wrap;gap:8px 18px;justify-content:center;}
.cat-btn{background:none;border:none;font-family:'Jost',sans-serif;font-size:13px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);cursor:pointer;padding:6px 2px;border-bottom:1px solid transparent;transition:color .15s,border-color .15s;}
.cat-btn:hover{color:var(--ink);} .cat-btn.active{color:var(--ink);border-bottom-color:var(--accent);}
#search{width:220px;background:transparent;border:none;border-bottom:1px solid var(--line);font-family:'Jost',sans-serif;font-size:13px;color:var(--ink);padding:6px 4px;outline:none;}
#search::placeholder{color:var(--muted);} #search:focus{border-bottom-color:var(--accent);}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:40px 28px;perspective:1400px;}
.card{cursor:pointer;transition:transform .35s cubic-bezier(.2,.8,.2,1);}
.card:hover{transform:translateY(-8px);}
.card .frame{position:relative;background:var(--panel);aspect-ratio:1/1;overflow:hidden;border:1px solid var(--line);box-shadow:0 1px 2px rgba(46,42,36,.06),0 10px 24px rgba(46,42,36,.08);transition:box-shadow .35s ease;}
.card:hover .frame{box-shadow:0 4px 10px rgba(46,42,36,.12),0 24px 46px rgba(46,42,36,.20);}
.card img{width:100%;height:100%;object-fit:contain;object-position:center;display:block;transition:transform .6s ease;}
.card:hover img{transform:scale(1.06);}
.card .num{position:absolute;top:10px;left:12px;font-family:'Playfair Display',serif;font-style:italic;font-size:14px;color:var(--ink);background:rgba(245,242,236,.9);padding:1px 9px;border-radius:2px;box-shadow:0 2px 6px rgba(46,42,36,.12);}
.card .cap{margin-top:12px;display:flex;justify-content:space-between;align-items:baseline;gap:10px;}
.card .name{font-family:'Playfair Display',serif;font-size:15px;color:var(--ink);}
.card .wa-chip{font-size:11px;color:var(--accent);white-space:nowrap;text-transform:uppercase;letter-spacing:1px;}
.card .cat-label{display:block;margin-top:2px;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);}
.card .short-desc{display:block;margin-top:6px;font-size:12px;line-height:1.5;color:var(--ink);}
.empty{grid-column:1/-1;text-align:center;padding:60px 0;color:var(--muted);font-family:'Playfair Display',serif;font-style:italic;}
footer{text-align:center;margin-top:80px;padding-top:28px;border-top:1px solid var(--line);}
footer .site{font-family:'Playfair Display',serif;font-style:italic;font-size:15px;color:var(--ink);}
footer .sub{margin-top:8px;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);}
footer .foot-links{margin-top:18px;display:flex;justify-content:center;gap:22px;flex-wrap:wrap;}
footer .foot-links a{font-size:12px;color:var(--ink);text-decoration:none;border-bottom:1px solid var(--line);padding-bottom:2px;transition:border-color .15s,color .15s;}
footer .foot-links a:hover{color:var(--accent);border-color:var(--accent);}
.overlay{display:none;position:fixed;inset:0;background:rgba(46,42,36,.55);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);z-index:1000;align-items:center;justify-content:center;padding:28px;opacity:0;transition:opacity .25s ease;}
.overlay.open{display:flex;opacity:1;}
.modal{background:var(--panel);max-width:960px;width:100%;max-height:88vh;overflow-y:auto;border:1px solid var(--line);border-radius:2px;position:relative;box-shadow:0 20px 40px rgba(46,42,36,.18),0 40px 90px rgba(46,42,36,.30);transform:translateY(14px) scale(.98);transition:transform .3s cubic-bezier(.2,.8,.2,1);}
.overlay.open .modal{transform:translateY(0) scale(1);}
.modal-close{position:absolute;top:16px;right:18px;background:none;border:none;font-size:22px;color:var(--ink);cursor:pointer;z-index:2;line-height:1;}
.modal-body{display:grid;grid-template-columns:1fr 1fr;gap:0;}
.modal-media{background:#fff;padding:28px;}
.modal-main-img{width:100%;aspect-ratio:1/1;object-fit:contain;object-position:center;background:#fafafa;}
.thumbs{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;}
.thumbs img{width:56px;height:56px;object-fit:contain;object-position:center;cursor:pointer;border:1px solid var(--line);opacity:.7;background:#fafafa;}
.thumbs img.active{opacity:1;border-color:var(--accent);}
.modal-info{padding:40px 36px;}
.modal-info .serial{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);}
.modal-info h2{font-family:'Playfair Display',serif;font-weight:500;font-size:26px;margin:8px 0 20px;}
.modal-info h4{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin:22px 0 8px;}
.modal-info h4:first-of-type{margin-top:0;}
.desc-text{font-size:13px;line-height:1.7;color:var(--ink);}
.swatches{display:flex;flex-wrap:wrap;gap:8px;}
.swatch{font-size:12px;padding:5px 12px;border:1px solid var(--line);color:var(--ink);}
.wa-btn{display:inline-block;margin-top:28px;padding:12px 26px;background:var(--ink);color:#fff;text-decoration:none;font-size:13px;letter-spacing:1px;text-transform:uppercase;transition:background .2s;}
.wa-btn:hover{background:var(--accent);}
.enquire-note{margin-top:10px;font-size:11.5px;color:var(--muted);line-height:1.6;}
@media (max-width:860px){.grid{grid-template-columns:repeat(2,1fr);} .logo{font-size:42px;}}
@media (max-width:720px){.modal-body{grid-template-columns:1fr;} .overlay{padding:0;align-items:flex-end;} .modal{max-height:94vh;border-radius:14px 14px 0 0;} .modal-media,.modal-info{padding:22px;} .thumbs{flex-wrap:nowrap;overflow-x:auto;} .thumbs img{flex:0 0 auto;}}
@media (max-width:520px){.grid{grid-template-columns:1fr 1fr;gap:22px 14px;} .wrap{padding:40px 16px 26px;} .logo{font-size:34px;} .cat-btn{font-size:12px;padding:8px 2px;} #search{width:150px;font-size:16px;}}
</style>
</head>

const WA = '918302192742';
const grid=document.getElementById('grid'),catsEl=document.getElementById('cats'),searchEl=document.getElementById('search'),overlay=document.getElementById('overlay'),modalBody=document.getElementById('modalBody');
let activeCat='All';
function waLink(p){
  var productUrl='https://ameckhouse.com/products/'+p.handle;
  var msg=encodeURIComponent("Hi Ameck House, I'd like the wholesale price for "+p.serial+" - "+p.name+". "+productUrl);
  return 'https://wa.me/'+WA+'?text='+msg;
}
function renderCats(){
  var cats=['All'].concat(Array.from(new Set(PRODUCTS.map(function(p){return p.category;}))));
  catsEl.innerHTML=cats.map(function(c){return '<button class="cat-btn'+(c===activeCat?' active':'')+'" data-cat="'+c+'">'+c+'</button>';}).join('');
  catsEl.querySelectorAll('.cat-btn').forEach(function(b){b.addEventListener('click',function(){activeCat=b.dataset.cat;renderCats();renderGrid();});});
}
function matches(p){
  var q=searchEl.value.trim().toLowerCase();
  var catOk=activeCat==='All'||p.category===activeCat;
  var qOk=!q||p.name.toLowerCase().indexOf(q)>=0||p.serial.toLowerCase().indexOf(q)>=0||p.category.toLowerCase().indexOf(q)>=0;
  return catOk&&qOk;
}
function renderGrid(){
  var list=PRODUCTS.filter(matches);
  if(!list.length){grid.innerHTML='<div class="empty">No styles match your search.</div>';return;}
  grid.innerHTML=list.map(function(p){
    return '<div class="card" data-id="'+p.id+'">'
      +'<div class="frame"><span class="num">'+p.serial+'</span><img src="'+p.images[0]+'" alt="'+p.name+'" loading="lazy"></div>'
      +'<div class="cap"><span class="name">'+p.name+'</span><span class="wa-chip">Enquire</span></div>'
      +'<span class="cat-label">'+p.category+'</span>'
      +(p.description? '<span class="short-desc">'+p.description+'</span>' : '')+'</div>';
  }).join('');
  grid.querySelectorAll('.card').forEach(function(c){c.addEventListener('click',function(){openModal(c.dataset.id);});});
}
function openModal(id){
  var p=PRODUCTS.find(function(x){return x.id===id;}); if(!p) return;
  var descHtml=p.description? '<div class="desc-text">'+p.description+'</div>' : '';
  var colorsHtml=p.colors.length? '<h4>Colours</h4><div class="swatches">'+p.colors.map(function(c){return '<span class="swatch">'+c+'</span>';}).join('')+'</div>' : '';
  var sizesHtml=p.sizes.length? '<h4>Sizes</h4><div class="swatches">'+p.sizes.map(function(s){return '<span class="swatch">'+s+'</span>';}).join('')+'</div>' : '';
  modalBody.innerHTML='<div class="modal-media"><img class="modal-main-img" id="mainImg" src="'+p.images[0]+'" alt="'+p.name+'"><div class="thumbs" id="thumbs"></div></div>'
    +'<div class="modal-info"><div class="serial">'+p.serial+'</div><h2>'+p.name+'</h2>'
    +descHtml+colorsHtml+sizesHtml
    +'<a class="wa-btn" href="'+waLink(p)+'" target="_blank" rel="noopener">Enquire on WhatsApp</a>'
    +'<div class="enquire-note">Price on request. Tapping the button opens WhatsApp with this style\'s link pre-filled so our team can quote you directly.</div></div>';
  var thumbsEl=modalBody.querySelector('#thumbs'), mainImg=modalBody.querySelector('#mainImg');
  thumbsEl.innerHTML=p.images.map(function(src,i){return '<img data-idx="'+i+'" src="'+src+'" class="'+(i===0?'active':'')+'">';}).join('');
  thumbsEl.querySelectorAll('img').forEach(function(el){el.addEventListener('click',function(){
    mainImg.src=el.src; thumbsEl.querySelectorAll('img').forEach(function(t){t.classList.remove('active');}); el.classList.add('active');
  });});
  overlay.classList.add('open');
}
function closeModal(){overlay.classList.remove('open');modalBody.innerHTML='';}
document.getElementById('modalClose').addEventListener('click',closeModal);
overlay.addEventListener('click',function(e){if(e.target===overlay)closeModal();});
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeModal();});
searchEl.addEventListener('input',renderGrid);
renderCats(); renderGrid();
</script>
</body>
</html>
