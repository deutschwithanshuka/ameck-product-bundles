<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ameck House — Catalogues</title>
<meta name="description" content="Ameck House wholesale export catalogues">
<meta property="og:title" content="Ameck House — Catalogues">
<meta property="og:description" content="Browse Ameck House wholesale export catalogues by category.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://catalogue.ameckhouse.com/">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: #F6F3EE;
    color: #1E1B16;
    min-height: 100vh;
  }
  header {
    background: #1E1B16;
    color: #F6F3EE;
    padding: 20px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  header .brand {
    font-weight: 700;
    letter-spacing: 0.08em;
    font-size: 15px;
  }
  header .contact {
    font-size: 13px;
    color: #C9C2B4;
    display: flex;
    gap: 20px;
  }
  main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 64px 40px 100px;
  }
  h1 {
    font-size: 42px;
    font-weight: 700;
    letter-spacing: 0.01em;
    margin-bottom: 8px;
  }
  .subtitle {
    font-size: 18px;
    color: #5C554A;
    margin-bottom: 4px;
  }
  .tag {
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #8A8272;
    margin-bottom: 40px;
    display: inline-block;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 24px;
  }
  .card {
    background: #FFFFFF;
    border-radius: 10px;
    overflow: hidden;
    text-decoration: none;
    color: inherit;
    display: block;
    box-shadow: 0 1px 3px rgba(30,27,22,0.08);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    border: 1px solid #EAE5DA;
  }
  .card:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 20px rgba(30,27,22,0.12);
  }
  .card-media {
    height: 180px;
    background: linear-gradient(135deg, #1E1B16 0%, #3A342A 100%);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card-media svg { width: 64px; height: 64px; }
  .card-body { padding: 20px 22px 24px; }
  .card-body h2 {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 6px;
  }
  .card-body p {
    font-size: 13px;
    color: #8A8272;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .card-cta {
    margin-top: 14px;
    font-size: 13px;
    font-weight: 600;
    color: #1E1B16;
  }
  footer {
    text-align: center;
    padding: 30px;
    font-size: 12px;
    color: #A39C8C;
  }
</style>
</head>
<body>
  <header>
    <div class="brand">AMECK HOUSE</div>
    <div class="contact">
      <span>ameckhouse.com</span>
      <span>info@ameckhouse.com</span>
    </div>
  </header>

  <main>
    <span class="tag">Wholesale Export Import Catalogues</span>
    <h1>Ameck House</h1>
    <p class="subtitle">Browse our product catalogues by category.</p>
    <br>
    <div class="grid">
      <a class="card" href="eyewear/">
        <div class="card-media">
          <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="#F6F3EE" stroke-width="4">
            <circle cx="30" cy="50" r="18"></circle>
            <circle cx="70" cy="50" r="18"></circle>
            <line x1="48" y1="50" x2="52" y2="50"></line>
            <line x1="12" y1="50" x2="2" y2="44"></line>
            <line x1="88" y1="50" x2="98" y2="44"></line>
          </svg>
        </div>
        <div class="card-body">
          <h2>Eyewear</h2>
          <p>18 Styles · Sunglasses &amp; Optical</p>
          <div class="card-cta">View catalogue →</div>
        </div>
      </a>
    </div>
  </main>

  <footer>© Ameck House. All rights reserved.</footer>
</body>
</html>
